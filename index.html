<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quran Kita — Quran Terjemah Suara</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-base:      #0a0a0a;
    --bg-panel:     #111111;
    --bg-card:      #1a1a1a;
    --bg-hover:     #242424;
    --bg-active:    #2a2a2a;
    --gold:         #c9a84c;
    --gold-dim:     #8a6f2e;
    --gold-glow:    rgba(201,168,76,0.15);
    --gold-subtle:  rgba(201,168,76,0.07);
    --text-primary: #f0ece0;
    --text-sec:     #a09880;
    --text-dim:     #5a5245;
    --border:       rgba(201,168,76,0.12);
    --border-dim:   rgba(255,255,255,0.05);
    --player-h:     90px;
    --sidebar-w:    280px;
    --radius:       10px;
    --font-body:    'Plus Jakarta Sans', sans-serif;
    --font-arabic:  'Amiri', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 1fr var(--player-h);
    grid-template-areas: "sidebar main" "player player";
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-area: sidebar;
    background: var(--bg-panel);
    border-right: 1px solid var(--border-dim);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border-dim);
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--gold-glow);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sidebar-search {
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 8px 12px;
    transition: border-color 0.2s;
  }

  .search-box:focus-within {
    border-color: var(--gold-dim);
  }

  .search-box svg { color: var(--text-dim); flex-shrink: 0; }

  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 13px;
    width: 100%;
  }

  .search-box input::placeholder { color: var(--text-dim); }

  .sidebar-label {
    padding: 8px 20px 6px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    flex-shrink: 0;
  }

  .surah-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  .surah-list::-webkit-scrollbar { width: 4px; }
  .surah-list::-webkit-scrollbar-track { background: transparent; }
  .surah-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .surah-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .surah-item:hover { background: var(--bg-hover); }

  .surah-item.active {
    background: var(--gold-subtle);
    border-color: var(--border);
  }

  .surah-num {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--bg-active);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-sec);
    font-weight: 600;
    flex-shrink: 0;
  }

  .surah-item.active .surah-num {
    background: var(--gold-glow);
    color: var(--gold);
  }

  .surah-info { flex: 1; min-width: 0; }

  .surah-name-id {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .surah-item.active .surah-name-id { color: var(--gold); }

  .surah-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .surah-name-ar {
    font-family: var(--font-arabic);
    font-size: 15px;
    color: var(--text-sec);
    flex-shrink: 0;
  }

  .surah-item.active .surah-name-ar { color: var(--gold); }

  /* ── MAIN AREA ── */
  .main {
    grid-area: main;
    overflow-y: auto;
    background: var(--bg-base);
    position: relative;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .main-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(to bottom, var(--bg-base) 80%, transparent);
    padding: 24px 32px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border-dim);
  }

  .surah-hero { flex: 1; }

  .surah-hero-ar {
    font-family: var(--font-arabic);
    font-size: 28px;
    color: var(--gold);
    line-height: 1.4;
  }

  .surah-hero-id {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 2px;
  }

  .surah-hero-meta {
    font-size: 12px;
    color: var(--text-sec);
    margin-top: 4px;
  }

  .btn-play-all {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: #0a0a0a;
    border: none;
    border-radius: 50px;
    padding: 10px 22px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-play-all:hover {
    background: #e0be6a;
    transform: scale(1.02);
  }

  .basmalah {
    text-align: center;
    padding: 24px 32px 8px;
    font-family: var(--font-arabic);
    font-size: 28px;
    color: var(--gold-dim);
    letter-spacing: 0.02em;
  }

  .ayat-list {
    padding: 8px 32px 32px;
  }

  .ayat-card {
    display: flex;
    gap: 20px;
    padding: 20px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }

  .ayat-card:hover {
    background: var(--bg-card);
    border-color: var(--border-dim);
  }

  .ayat-card.active {
    background: var(--gold-subtle);
    border-color: var(--border);
  }

  .ayat-card.playing {
    background: var(--gold-subtle);
    border-color: var(--gold-dim);
  }

  .ayat-num-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ayat-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg-active);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--text-sec);
    font-weight: 600;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .ayat-card.active .ayat-num,
  .ayat-card.playing .ayat-num {
    background: var(--gold-glow);
    color: var(--gold);
    border-color: var(--gold-dim);
  }

  .btn-play-ayat {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .ayat-card:hover .btn-play-ayat { opacity: 1; }
  .ayat-card.playing .btn-play-ayat { opacity: 1; }

  .btn-play-ayat svg { color: #0a0a0a; }

  .ayat-content { flex: 1; }

  .ayat-arabic {
    font-family: var(--font-arabic);
    font-size: 26px;
    line-height: 1.9;
    color: var(--text-primary);
    text-align: right;
    direction: rtl;
    margin-bottom: 12px;
  }

  .ayat-card.active .ayat-arabic,
  .ayat-card.playing .ayat-arabic { color: var(--gold); }

  .ayat-terjemah {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-sec);
    border-top: 1px solid var(--border-dim);
    padding-top: 10px;
  }

  .ayat-card.active .ayat-terjemah,
  .ayat-card.playing .ayat-terjemah { color: var(--text-primary); }

  .playing-badge {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .ayat-card.playing .playing-badge { display: flex; }

  .playing-bar {
    display: flex; gap: 2px; align-items: flex-end; height: 12px;
  }

  .playing-bar span {
    width: 3px;
    background: var(--gold);
    border-radius: 1px;
    animation: barAnim 0.8s ease-in-out infinite alternate;
  }

  .playing-bar span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .playing-bar span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .playing-bar span:nth-child(3) { height: 7px; animation-delay: 0.3s; }

  @keyframes barAnim { to { transform: scaleY(0.3); } }

  /* ── PLAYER BAR ── */
  .player {
    grid-area: player;
    background: #161616;
    border-top: 1px solid var(--border-dim);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: var(--player-h);
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 240px;
    flex-shrink: 0;
  }

  .player-icon {
    width: 48px; height: 48px;
    border-radius: 8px;
    background: var(--gold-glow);
    border: 1px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-arabic);
    font-size: 20px;
    color: var(--gold);
    flex-shrink: 0;
  }

  .player-names { min-width: 0; }

  .player-ayat-ar {
    font-family: var(--font-arabic);
    font-size: 16px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
  }

  .player-surah-id {
    font-size: 11px;
    color: var(--text-sec);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .ctrl-btns {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-sec);
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    width: 32px; height: 32px;
    transition: all 0.15s;
  }

  .ctrl-btn:hover { color: var(--text-primary); }

  .ctrl-btn.primary {
    width: 40px; height: 40px;
    background: var(--text-primary);
    color: var(--bg-base);
  }

  .ctrl-btn.primary:hover {
    background: var(--gold);
    transform: scale(1.04);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 540px;
  }

  .progress-time {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 36px;
    text-align: center;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--bg-active);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    background: var(--text-primary);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
    pointer-events: none;
  }

  .progress-track:hover .progress-fill { background: var(--gold); }

  .player-right {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 200px;
    justify-content: flex-end;
    flex-shrink: 0;
  }

  .phase-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .phase-badge.arab {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border: 1px solid var(--gold-dim);
  }

  .phase-badge.terjemah {
    background: rgba(88,166,255,0.1);
    color: #58a6ff;
    border: 1px solid rgba(88,166,255,0.3);
  }

  .phase-badge.idle {
    background: var(--bg-active);
    color: var(--text-dim);
    border: 1px solid var(--border-dim);
  }

  .vol-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vol-slider {
    -webkit-appearance: none;
    width: 70px;
    height: 4px;
    border-radius: 2px;
    background: var(--bg-active);
    outline: none;
    cursor: pointer;
  }

  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--text-primary);
    cursor: pointer;
  }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    gap: 16px;
    color: var(--text-dim);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border-dim);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width: 700px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr var(--player-h);
      grid-template-areas: "main" "player";
    }
    .sidebar { display: none; }
    .main-header { padding: 16px; }
    .ayat-list { padding: 8px 16px 24px; }
    .basmalah { padding: 16px 16px 4px; }
    .player { padding: 0 12px; gap: 10px; }
    .player-info { width: 140px; }
    .player-right { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">
        <div class="logo-icon">☪</div>
        Al-Quran Digital
      </div>
      <div class="logo-sub">Bacaan & Terjemahan Indonesia</div>
    </div>
    <div class="sidebar-search">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Cari surah..." oninput="filterSurah()"/>
      </div>
    </div>
    <div class="sidebar-label">Daftar Surah</div>
    <div class="surah-list" id="surahList"></div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main" id="mainArea">
    <div class="loading">
      <div class="spinner"></div>
      <span>Memuat daftar surah…</span>
    </div>
  </main>

  <!-- ── PLAYER ── -->
  <div class="player">
    <div class="player-info">
      <div class="player-icon" id="playerIcon">☪</div>
      <div class="player-names">
        <div class="player-ayat-ar" id="playerAyatAr">—</div>
        <div class="player-surah-id" id="playerSurahId">Pilih surah untuk mulai</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="ctrl-btns">
        <button class="ctrl-btn" onclick="prevAyat()" title="Ayat sebelumnya">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn primary" id="btnPlayPause" onclick="togglePlay()">
          <svg id="iconPlay" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextAyat()" title="Ayat berikutnya">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 4.72 3.43L8 16.85V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
      <div class="progress-wrap">
        <span class="progress-time" id="timeCur">0:00</span>
        <div class="progress-track" onclick="seekAudio(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-time" id="timeDur">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <span class="phase-badge idle" id="phaseBadge">Siap</span>
      <div class="vol-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" color="#5a5245"><path d="M11 5 6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)"/>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA SURAH ──
const SURAH_DATA = [

  [18,"Al-Kahf","الكهف",110,"Makkiyyah"],
  [19,"Maryam","مريم",98,"Makkiyyah"],
  [20,"Ta Ha","طه",135,"Makkiyyah"],
  [21,"Al-Anbiya","الأنبياء",112,"Makkiyyah"],
  [22,"Al-Hajj","الحج",78,"Madaniyyah"],
  [23,"Al-Mu'minun","المؤمنون",118,"Makkiyyah"],
  [24,"An-Nur","النور",64,"Madaniyyah"],
  [25,"Al-Furqan","الفرقان",77,"Makkiyyah"],
  [26,"Asy-Syu'ara","الشعراء",227,"Makkiyyah"],
  [27,"An-Naml","النمل",93,"Makkiyyah"],
  [28,"Al-Qasas","القصص",88,"Makkiyyah"],
  [29,"Al-'Ankabut","العنكبوت",69,"Makkiyyah"],
  [30,"Ar-Rum","الروم",60,"Makkiyyah"],
  [31,"Luqman","لقمان",34,"Makkiyyah"],
  [32,"As-Sajdah","السجدة",30,"Makkiyyah"],
  [33,"Al-Ahzab","الأحزاب",73,"Madaniyyah"],
  [34,"Saba'","سبأ",54,"Makkiyyah"],
  [35,"Fatir","فاطر",45,"Makkiyyah"],
  [36,"Ya Sin","يس",83,"Makkiyyah"],
  [37,"As-Saffat","الصافات",182,"Makkiyyah"],

// ── STATE ──
let currentSurahNum = null;
let currentAyatNum  = 1;
let currentSurahData = null;
let allAyat = [];
let playing = false;
let phase = 'idle'; // arab | terjemah | idle
const audio = new Audio();
audio.crossOrigin = "anonymous";

// ── HELPERS ──
function pad(n, l) { return String(n).padStart(l, '0'); }
function arabURL(s, a) { return `https://everyayah.com/data/Alafasy_64kbps/${pad(s,3)}${pad(a,3)}.mp3`; }
function terjURL(s, a)  { return `https://archive.org/download/AlQuran-terjemahan-indonesia-tanpa-bahasa-arab/${pad(s,3)}${pad(a,3)}.mp3`; }

function fmtTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ── RENDER SIDEBAR ──
function renderSidebar(list) {
  const el = document.getElementById('surahList');
  el.innerHTML = list.map(([num, nameId, nameAr, ayatCount, type]) => `
    <div class="surah-item ${num === currentSurahNum ? 'active' : ''}"
         id="si-${num}" onclick="loadSurah(${num})">
      <div class="surah-num">${num}</div>
      <div class="surah-info">
        <div class="surah-name-id">${nameId}</div>
        <div class="surah-meta">${ayatCount} ayat · ${type}</div>
      </div>
      <div class="surah-name-ar">${nameAr}</div>
    </div>
  `).join('');
}

function filterSurah() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = SURAH_DATA.filter(([num, nameId, nameAr]) =>
    nameId.toLowerCase().includes(q) || nameAr.includes(q) || String(num).includes(q)
  );
  renderSidebar(filtered);
}

// ── LOAD SURAH ──
async function loadSurah(num) {
  stopAudio();
  currentSurahNum = num;
  currentAyatNum = 1;
  const surah = SURAH_DATA.find(s => s[0] === num);
  currentSurahData = surah;

  // update sidebar active
  document.querySelectorAll('.surah-item').forEach(el => el.classList.remove('active'));
  const siEl = document.getElementById(`si-${num}`);
  if (siEl) siEl.classList.add('active');

  // show loading
  document.getElementById('mainArea').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <span>Memuat ${surah[1]}…</span>
    </div>`;

  try {
    const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani,id.indonesian`);
    const json = await res.json();
    const arabEdition = json.data[0];
    const terjEdition = json.data[1];
    allAyat = arabEdition.ayahs.map((a, i) => ({
      num: a.numberInSurah,
      arabic: a.text,
      terjemah: terjEdition.ayahs[i].text
    }));
    renderMain(surah, allAyat);
  } catch(e) {
    document.getElementById('mainArea').innerHTML = `
      <div class="loading"><span style="color:#c0392b">Gagal memuat. Periksa koneksi internet.</span></div>`;
  }
}

function renderMain(surah, ayat) {
  const [num, nameId, nameAr, ayatCount, type] = surah;
  const showBasmalah = num !== 1 && num !== 9;
  document.getElementById('mainArea').innerHTML = `
    <div class="main-header">
      <div class="surah-hero">
        <div class="surah-hero-ar">${nameAr}</div>
        <div class="surah-hero-id">${nameId}</div>
        <div class="surah-hero-meta">${ayatCount} Ayat · ${type} · Surah ke-${num}</div>
      </div>
      <button class="btn-play-all" onclick="playFromAyat(1)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Putar Semua
      </button>
    </div>
    ${showBasmalah ? `<div class="basmalah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>` : ''}
    <div class="ayat-list">
      ${ayat.map(a => `
        <div class="ayat-card" id="ayat-${a.num}" onclick="playFromAyat(${a.num})">
          <div class="ayat-num-wrap">
            <div class="ayat-num">${a.num}</div>
            <button class="btn-play-ayat" title="Putar ayat ${a.num}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
          <div class="ayat-content">
            <div class="ayat-arabic">${a.arabic}</div>
            <div class="ayat-terjemah">${a.terjemah}</div>
            <div class="playing-badge">
              <div class="playing-bar"><span></span><span></span><span></span></div>
              Sedang diputar
            </div>
          </div>
        </div>
      `).join('')}
    </div>`;
}

// ── AUDIO ENGINE ──
function playFromAyat(ayatNum) {
  if (!currentSurahData) return;
  currentAyatNum = ayatNum;
  playing = true;
  updatePlayPauseBtn();
  playArab();
}

function playArab() {
  phase = 'arab';
  updatePlayerUI();
  audio.src = arabURL(currentSurahNum, currentAyatNum);
  audio.play().catch(() => playTerjemah());
  audio.onended = () => { if (playing) playTerjemah(); };
}

function playTerjemah() {
  phase = 'terjemah';
  updatePlayerUI();
  audio.src = terjURL(currentSurahNum, currentAyatNum);
  audio.play().catch(() => nextAyatAuto());
  audio.onended = () => { if (playing) nextAyatAuto(); };
}

function nextAyatAuto() {
  if (!playing) return;
  const maxAyat = currentSurahData[3];
  if (currentAyatNum >= maxAyat) {
    stopAudio();
    return;
  }
  currentAyatNum++;
  scrollToAyat(currentAyatNum);
  playArab();
}

function stopAudio() {
  playing = false;
  phase = 'idle';
  audio.pause();
  audio.src = '';
  updatePlayPauseBtn();
  updatePlayerUI();
  document.querySelectorAll('.ayat-card').forEach(el => {
    el.classList.remove('playing', 'active');
  });
}

function togglePlay() {
  if (!currentSurahData) return;
  if (playing) {
    playing = false;
    audio.pause();
    updatePlayPauseBtn();
    updatePhase('idle');
  } else {
    playing = true;
    audio.play().catch(() => {});
    updatePlayPauseBtn();
    updatePhase(phase === 'idle' ? 'arab' : phase);
  }
}

function prevAyat() {
  if (!currentSurahData) return;
  if (currentAyatNum > 1) { currentAyatNum--; scrollToAyat(currentAyatNum); }
  if (playing) playArab();
}

function nextAyat() {
  if (!currentSurahData) return;
  const maxAyat = currentSurahData[3];
  if (currentAyatNum < maxAyat) { currentAyatNum++; scrollToAyat(currentAyatNum); }
  if (playing) playArab();
}

function scrollToAyat(num) {
  const el = document.getElementById(`ayat-${num}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function seekAudio(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function setVolume(v) { audio.volume = v; }

// ── UI UPDATES ──
function updatePlayPauseBtn() {
  document.getElementById('iconPlay').style.display = playing ? 'none' : 'block';
  document.getElementById('iconPause').style.display = playing ? 'block' : 'none';
}

function updatePhase(p) {
  phase = p;
  const badge = document.getElementById('phaseBadge');
  badge.className = 'phase-badge ' + (p === 'arab' ? 'arab' : p === 'terjemah' ? 'terjemah' : 'idle');
  badge.textContent = p === 'arab' ? 'Arab' : p === 'terjemah' ? 'Terjemahan' : 'Siap';
}

function updatePlayerUI() {
  updatePhase(phase);
  // update ayat cards
  document.querySelectorAll('.ayat-card').forEach(el => el.classList.remove('playing', 'active'));
  const card = document.getElementById(`ayat-${currentAyatNum}`);
  if (card) {
    card.classList.add(playing ? 'playing' : 'active');
  }
  // update player info
  const ayat = allAyat.find(a => a.num === currentAyatNum);
  if (ayat && currentSurahData) {
    document.getElementById('playerAyatAr').textContent = ayat.arabic.length > 40
      ? ayat.arabic.substring(0, 40) + '…' : ayat.arabic;
    document.getElementById('playerSurahId').textContent =
      `${currentSurahData[1]} · Ayat ${currentAyatNum}`;
    document.getElementById('playerIcon').textContent = currentSurahData[2].charAt(0) || '☪';
  }
}

// ── PROGRESS BAR ──
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCur').textContent = fmtTime(audio.currentTime);
  document.getElementById('timeDur').textContent = fmtTime(audio.duration);
});

// ── INIT ──
renderSidebar(SURAH_DATA);
loadSurah(1);
</script>
